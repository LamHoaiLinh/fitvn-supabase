services:
  - type: web
    name: fitvn-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_ENV
        value: production
      - key: DATA_BACKEND
        value: supabase
      - key: MAX_ACTIVE_USERS
        value: 20
      - key: PGSSLMODE
        value: require
      - key: PG_POOL_MAX
        value: 5
      - key: APP_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_EXERCISE_BUCKET
        value: fitvn-exercise-images
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
